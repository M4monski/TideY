<!doctype html>
<html>
  <head>
    <title>TIDEY Command Center</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="video-section">
      <div class="status-overlay">🔴 LIVE: TIDEY AI VISION</div>
      <img id="video_feed" src="/video_feed" alt="Live Camera Feed" />
    </div>

    <div class="control-section">
      <div class="panel">
        <h4 class="panel-title">CHASSIS CONTROL & TELEMETRY</h4>

        <div class="telemetry-grid">
          <div class="tel-item">
            <span class="tel-label">STATUS:</span>
            <span id="hud-status" style="color: #0f0">Booting...</span>
          </div>
          <div class="tel-item">
            <span class="tel-label">IMU:</span>
            <span id="hud-imu" style="color: #0f0">Checking...</span>
          </div>
          <div class="tel-item">
            <span class="tel-label">YAW:</span> <span id="hud-yaw">0.0°</span>
          </div>
          <div class="tel-item">
            <span class="tel-label">PITCH:</span>
            <span id="hud-pitch">0.0°</span>
          </div>
          <div class="tel-item full-width-tel">
            <span class="tel-label">ROLL:</span> <span id="hud-roll">0.0°</span>
          </div>
        </div>

        <div class="d-pad">
          <div class="empty"></div>
          <button
            onmousedown="startMove('w')"
            onmouseup="stopMove()"
            onmouseleave="stopMove()"
            ontouchstart="startMove('w'); event.preventDefault()"
            ontouchend="stopMove(); event.preventDefault()"
          >
            FWD
          </button>
          <div class="empty"></div>

          <button
            onmousedown="startMove('a')"
            onmouseup="stopMove()"
            onmouseleave="stopMove()"
            ontouchstart="startMove('a'); event.preventDefault()"
            ontouchend="stopMove(); event.preventDefault()"
          >
            LFT
          </button>
          <button
            onmousedown="startMove('s')"
            onmouseup="stopMove()"
            onmouseleave="stopMove()"
            ontouchstart="startMove('s'); event.preventDefault()"
            ontouchend="stopMove(); event.preventDefault()"
          >
            REV
          </button>
          <button
            onmousedown="startMove('d')"
            onmouseup="stopMove()"
            onmouseleave="stopMove()"
            ontouchstart="startMove('d'); event.preventDefault()"
            ontouchend="stopMove(); event.preventDefault()"
          >
            RGT
          </button>
        </div>

        <hr
          style="
            border-color: #333;
            width: 100%;
            margin: 15px 0 5px 0;
            border-style: dashed;
          "
        />
        <div style="font-size: 10px; color: #777; letter-spacing: 1px">
          AUTONOMOUS DISTANCE
        </div>
        <input
          type="number"
          id="distanceInput"
          class="dist-input"
          placeholder="Distance (cm)"
        />
        <div class="dist-btn-group">
          <button class="dist-btn" onclick="sendDistanceMove('w')">FWD</button>
          <button class="dist-btn" onclick="sendDistanceMove('s')">REV</button>
          <button
            class="dist-btn"
            style="background-color: #00d2d3; color: #111"
            onclick="sendSweep()"
          >
            SWEEP
          </button>
        </div>
      </div>

      <div class="panel">
        <h4 class="panel-title">TARGET ACQUISITION</h4>
        <button id="captureBtn" class="btn-cam" onclick="takePhoto()">
          📸 SNAP HIGH-RES TARGET
        </button>
        <div class="snapshot-container">
          <span id="snapshotText" class="snapshot-text">Awaiting Capture</span>
          <img id="lastPhoto" src="" alt="Captured Image" />
        </div>

        <button
          id="trackBtn"
          class="arm-btn bg-yellow"
          style="width: 90%; max-width: 250px; padding: 12px; margin-top: 15px"
          onclick="toggleTracking()"
        >
          🎯 START AUTO-ALIGN
        </button>
      </div>

      <div class="panel">
        <h4 class="panel-title">RESPONSE ZONE TUNING</h4>

        <div style="width: 100%; margin-top: 15px">
          <label style="font-size: 10px; color: #777">BOTTOM WIDTH (px)</label>
          <input
            type="number"
            id="rz_bw"
            class="dist-input"
            style="margin-top: 2px; margin-bottom: 8px"
            value="400"
          />

          <label style="font-size: 10px; color: #777">TOP WIDTH (px)</label>
          <input
            type="number"
            id="rz_tw"
            class="dist-input"
            style="margin-top: 2px; margin-bottom: 8px"
            value="150"
          />

          <label style="font-size: 10px; color: #777">HEIGHT (px)</label>
          <input
            type="number"
            id="rz_h"
            class="dist-input"
            style="margin-top: 2px; margin-bottom: 8px"
            value="180"
          />

          <label style="font-size: 10px; color: #777"
            >Y OFFSET (Positive = Down)</label
          >
          <input
            type="number"
            id="rz_y"
            class="dist-input"
            style="margin-top: 2px; margin-bottom: 8px"
            value="120"
          />
        </div>

        <button
          class="arm-btn bg-blue"
          style="width: 100%; padding: 10px; margin-top: 5px"
          onclick="updateResponseZone()"
        >
          UPDATE LIVE ZONE
        </button>
      </div>

      <div class="panel">
        <h4 class="panel-title">ROBOTIC ARM SEQUENCE</h4>
        <div class="arm-grid">
          <button
            class="arm-btn bg-yellow half-width"
            onclick="sendCommand('arm', 'pickup')"
          >
            🔽 EXECUTE PICKUP
          </button>
          <button class="arm-btn bg-grey" onclick="sendCommand('arm', 'home')">
            🏠 HOME
          </button>

          <button
            class="arm-btn bg-blue"
            onclick="sendCommand('arm', 'drop_l')"
          >
            👈 DROP L
          </button>
          <button
            class="arm-btn bg-blue"
            onclick="sendCommand('arm', 'drop_c')"
          >
            🔽 DROP C
          </button>
          <button
            class="arm-btn bg-blue"
            onclick="sendCommand('arm', 'drop_r')"
          >
            DROP R 👉
          </button>
        </div>
      </div>

      <div class="panel">
        <h4 class="panel-title">MANUAL ARM</h4>
        <div
          id="angleDisplay"
          style="
            font-size: 11px;
            color: #00d2d3;
            margin-top: 20px;
            margin-bottom: 10px;
            font-family: monospace;
            text-align: center;
          "
        >
          Loading angles...
        </div>

        <select
          id="jointSelect"
          style="
            width: 90%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: #111;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
          "
        >
          <option value="base">Base</option>
          <option value="shoulder">Shoulder</option>
          <option value="elbow">Elbow</option>
          <option value="wpitch">Wrist Pitch</option>
          <option value="wroll">Wrist Roll</option>
          <option value="gripper">Gripper</option>
        </select>

        <input
          type="number"
          id="angleInput"
          placeholder="Angle (0-270)"
          style="
            width: 90%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: #111;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
          "
        />

        <button
          class="arm-btn bg-yellow"
          style="width: 90%; padding: 10px"
          onclick="sendManualMove()"
        >
          MOVE JOINT
        </button>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
